site_name: Arc
site_description: Pragmatic functional programming for Swift — Either, Validated, Effect and more. Async-first, production-ready, no boilerplate.
site_url: https://cyrilleguipie.github.io/arc
repo_url: https://github.com/cyrilleguipie/arc
repo_name: cyrilleguipie/arc
edit_uri: edit/main/docs/docs/
copyright: Copyright &copy; 2025 Cyrille Guipié — MIT License

theme:
  name: material
  custom_dir: ../overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - announce.dismiss
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/arc-logo.svg
  favicon: assets/arc-logo.svg

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - social:
      cards_layout_options:
        background_color: "#1a1a2e"
        color: "#c4b5fd"
        font_family: Inter
  - tags
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - meta

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Core Types:
      - Either: api/either.md
      - Option: api/option.md
      - Validated: api/validated.md
      - NonEmptyArray: api/non-empty-array.md
      - Effect: api/effect.md
  - DSL & Extensions:
      - either { } DSL: api/either-dsl.md
      - Extensions: api/extensions.md
  - Guides:
      - Error Handling: guides/error-handling.md
      - Async Pipelines: guides/async-pipelines.md
      - Form Validation: guides/form-validation.md
  - Philosophy: philosophy.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cyrilleguipie/arc
      name: Arc on GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/cyrilleguipie
      name: Follow on X
  generator: false
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for letting us know.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/seo.js
