site_name: Arc
site_description: Pragmatic functional programming for Swift
site_url: https://cyrilleguipie.github.io/arc
repo_url: https://github.com/cyrilleguipie/arc
repo_name: cyrilleguipie/arc
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/arc-logo.svg
  favicon: assets/arc-logo.svg

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Core Types:
      - Either: api/either.md
      - Option: api/option.md
      - Validated: api/validated.md
      - NonEmptyArray: api/non-empty-array.md
      - Effect: api/effect.md
  - DSL & Extensions:
      - either { } DSL: api/either-dsl.md
      - Extensions: api/extensions.md
  - Guides:
      - Error Handling: guides/error-handling.md
      - Async Pipelines: guides/async-pipelines.md
      - Form Validation: guides/form-validation.md
  - Philosophy: philosophy.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourorg/arc
  generator: false

extra_css:
  - stylesheets/extra.css
